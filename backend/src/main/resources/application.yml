server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/postgres?currentSchema=chatbot
    username: postgres
    password: posgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: chatbot

  flyway:
    enabled: false
    locations: classpath:db/migration
    schemas: chatbot

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
