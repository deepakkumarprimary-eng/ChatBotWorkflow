# ─── Dev Profile Configuration ────────────────────────────────────────────────
# Local development settings - safe defaults for developer machines

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=chatbot_db
spring.datasource.username=postgres
spring.datasource.password=posgres

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.show-sql=true

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5

# ─── Stale Session Cleanup ────────────────────────────────────────────────────
# Set to false to disable cleanup during local development
chatbot.cleanup.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
# Dev profile uses text-based console logging (no JSON)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ─── Encryption (Base64-encoded 32-byte AES-256 key for local dev only) ───────
encryption.key=ZGV2LWxvY2FsLWVuY3J5cHRpb24ta2V5LTMyYnl0ZXM=

# ─── WebSocket Authentication ─────────────────────────────────────────────────
websocket.api-key=dev-api-key-12345

# ─── SSRF Protection (empty = allow all non-private hosts) ────────────────────
ssrf.allowed-hosts=
