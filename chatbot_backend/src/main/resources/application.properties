# Server Configuration
server.port=8080

# ─── Spring Profiles ─────────────────────────────────────────
spring.profiles.default=dev

# ─── Shared Datasource Configuration ─────────────────────────
# Credentials (url, username, password) are in profile-specific files
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL Initialization (run schema.sql on startup)
spring.sql.init.mode=always

# Jackson Serialization (dates as ISO strings)
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Redis Connection ────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=1000ms

# ─── Workflow Cache ──────────────────────────────────────────
cache.workflow.ttl-minutes=10

# ─── ApiConfig Cache ─────────────────────────────────────────
cache.apiconfig.ttl-minutes=10

# ─── Pending Session Store ───────────────────────────────────
session.pending.ttl-minutes=5

# ─── RestClient Pool ────────────────────────────────────────
http.client.pool.max-size=20
http.client.pool.max-connections-per-route=20
http.client.pool.max-connections-total=100

# ─── Exponential Backoff ─────────────────────────────────────
http.retry.base-delay-ms=1000
http.retry.max-delay-ms=10000

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ─── Application Info ────────────────────────────────────────
info.app.name=Chatbot Workflow Engine
info.app.version=@project.version@
info.app.build-time=@maven.build.timestamp@

# ─── Health Indicator Thresholds ─────────────────────────────
chatbot.health.websocket.degraded-threshold=800

# ─── Stale Session Cleanup ────────────────────────────────────
chatbot.cleanup.enabled=true
chatbot.cleanup.inactivity-threshold-hours=24
chatbot.cleanup.interval-ms=3600000

# ─── Graceful Shutdown ────────────────────────────────────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
chatbot.shutdown.timeout-seconds=30

# ─── OpenAPI / SpringDoc ──────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ─── WebSocket Resilience ────────────────────────────────────
chatbot.websocket.max-connections=1000
chatbot.websocket.inactivity-timeout-minutes=30
chatbot.websocket.heartbeat-interval-ms=10000
chatbot.websocket.send-buffer-size=50
chatbot.websocket.buffer-drain-timeout-seconds=30
