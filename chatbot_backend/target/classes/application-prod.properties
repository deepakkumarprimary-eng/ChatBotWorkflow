# ─── Production Profile Configuration ─────────────────────────────────────────
# All sensitive values reference environment variables with NO defaults.
# Missing variables will cause Spring to fail at startup with an unresolved
# placeholder error, ensuring misconfigured deployments are caught immediately.

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ─── Encryption ───────────────────────────────────────────────────────────────
encryption.key=${ENCRYPTION_KEY}

# ─── WebSocket Authentication ─────────────────────────────────────────────────
websocket.api-key=${WEBSOCKET_API_KEY}

# ─── SSRF Protection ─────────────────────────────────────────────────────────
ssrf.allowed-hosts=${SSRF_ALLOWED_HOSTS}

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=false
