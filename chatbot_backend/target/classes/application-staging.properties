# ─── Staging Profile Configuration ────────────────────────────────────────────
# Staging environment settings - mirrors production structure with moderate values

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://staging-db.internal:5432/postgres?currentSchema=chatbot_db
spring.datasource.username=chatbot_staging
spring.datasource.password=staging-db-password

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ─── Logging (text-based console output) ──────────────────────────────────────
logging.level.root=INFO
logging.level.com.xpressbees.chatbot=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=https://staging.xpressbees.com

# ─── Encryption (Base64-encoded 32-byte AES-256 key for staging) ──────────────
encryption.key=c3RhZ2luZy1lbmNyeXB0LWtleS1mb3ItMzItYnl0ZXM=

# ─── WebSocket Authentication ─────────────────────────────────────────────────
websocket.api-key=staging-api-key-67890

# ─── SSRF Protection ─────────────────────────────────────────────────────────
ssrf.allowed-hosts=*.xpressbees.com,*.internal
