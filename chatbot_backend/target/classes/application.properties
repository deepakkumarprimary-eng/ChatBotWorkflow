# Server Configuration
server.port=8080

# PostgreSQL Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=chatbot_db
spring.datasource.username=postgres
spring.datasource.password=posgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL Initialization (run schema.sql on startup)
spring.sql.init.mode=always

# Jackson Serialization (dates as ISO strings)
spring.jackson.serialization.write-dates-as-timestamps=false
