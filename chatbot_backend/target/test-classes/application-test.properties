# ─── Test Profile Configuration ───────────────────────────────────────────────

# ─── WebSocket Authentication ─────────────────────────────────────────────────
websocket.api-key=test-api-key-12345

# ─── Encryption key (32-byte Base64 for tests) ───────────────────────────────
encryption.key=ZGV2LWxvY2FsLWVuY3J5cHRpb24ta2V5LTMyYnl0ZXM=

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ─── SSRF Protection ─────────────────────────────────────────────────────────
ssrf.allowed-hosts=

# ─── WebSocket Resilience ────────────────────────────────────────────────────
chatbot.websocket.max-connections=1000
chatbot.websocket.inactivity-timeout-minutes=30
chatbot.websocket.heartbeat-interval-ms=10000
chatbot.websocket.send-buffer-size=50
chatbot.websocket.buffer-drain-timeout-seconds=30
