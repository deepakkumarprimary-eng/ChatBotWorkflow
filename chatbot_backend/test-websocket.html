<!DOCTYPE html>
<html>
<head>
    <title>Chatbot Workflow Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; padding: 20px; background: #1a1a2e; color: #eee; }
        h2 { color: #00d4ff; margin-top: 0; }
        .container { max-width: 700px; margin: 0 auto; }
        .panel { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 8px; }
        .btn-connect { background: #00d4ff; color: #000; }
        .btn-disconnect { background: #ff4757; color: #fff; }
        .btn-start { background: #2ed573; color: #000; }
        .btn-send { background: #ffa502; color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #eee; font-size: 14px; width: 120px; }
        input.wide { width: 350px; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #eee; font-size: 14px; }
        .chat-box { background: #0f3460; border-radius: 8px; padding: 15px; height: 400px; overflow-y: auto; margin-top: 10px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; max-width: 85%; }
        .msg-bot { background: #16213e; border-left: 3px solid #00d4ff; }
        .msg-user { background: #1a3a5c; border-left: 3px solid #2ed573; margin-left: auto; }
        .msg-error { background: #2d1b1b; border-left: 3px solid #ff4757; }
        .msg-system { background: #1a2a1a; border-left: 3px solid #7bed9f; font-size: 12px; }
        .msg-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .msg-text { font-size: 14px; }
        .msg-meta { font-size: 11px; color: #666; margin-top: 4px; font-family: monospace; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-connected { background: #2ed573; }
        .status-disconnected { background: #ff4757; }
        #sessionInfo { font-size: 12px; color: #7bed9f; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 Chatbot Workflow Tester</h2>

        <!-- Connection Panel -->
        <div class="panel">
            <span class="status status-disconnected" id="statusDot"></span>
            <button class="btn btn-connect" onclick="connect()" id="btnConnect">Connect</button>
            <button class="btn btn-disconnect" onclick="disconnect()" id="btnDisconnect" disabled>Disconnect</button>
            <span style="margin-left:15px; font-size:12px; color:#888;" id="connStatus">Disconnected</span>
        </div>

        <!-- Workflow Selection Panel -->
        <div class="panel">
            <label style="color:#aaa; font-size:13px;">Select Workflow:</label>
            <select id="workflowSelect" disabled>
                <option value="">-- Connect first --</option>
            </select>
            <button class="btn btn-start" onclick="startWorkflow()" id="btnStart" disabled>Start Workflow</button>
            <div id="sessionInfo"></div>
        </div>

        <!-- Chat Panel -->
        <div class="panel">
            <input type="text" class="wide" id="userMessage" placeholder="Type your response here..." onkeypress="if(event.key==='Enter')sendMessage()" disabled />
            <button class="btn btn-send" onclick="sendMessage()" id="btnSend" disabled>Send</button>
            <div class="chat-box" id="chatBox"></div>
        </div>
    </div>

    <script>
        var stompClient = null;
        var currentSessionId = null;
        var sessionSubscription = null;

        function addMessage(type, text, meta) {
            var chatBox = document.getElementById('chatBox');
            var div = document.createElement('div');
            div.className = 'msg msg-' + type;
            var label = type === 'bot' ? '🤖 Bot' : type === 'user' ? '👤 You' : type === 'error' ? '❌ Error' : '⚙️ System';
            div.innerHTML = '<div class="msg-label">' + label + '</div><div class="msg-text">' + text + '</div>';
            if (meta) div.innerHTML += '<div class="msg-meta">' + meta + '</div>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setConnected(connected) {
            document.getElementById('statusDot').className = 'status ' + (connected ? 'status-connected' : 'status-disconnected');
            document.getElementById('connStatus').textContent = connected ? 'Connected' : 'Disconnected';
            document.getElementById('btnConnect').disabled = connected;
            document.getElementById('btnDisconnect').disabled = !connected;
        }

        function connect() {
            var socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                setConnected(true);
                addMessage('system', 'Connected to WebSocket');

                // Subscribe to chat.init — this triggers the server to return sessionId + workflows
                stompClient.subscribe('/app/chat.init', function(message) {
                    var data = JSON.parse(message.body);
                    currentSessionId = data.sessionId;
                    document.getElementById('sessionInfo').textContent = 'Session: ' + currentSessionId;
                    addMessage('system', 'Session created: ' + currentSessionId);

                    // Populate workflow dropdown
                    var select = document.getElementById('workflowSelect');
                    select.innerHTML = '';
                    if (data.workflows && data.workflows.length > 0) {
                        data.workflows.forEach(function(wf) {
                            var option = document.createElement('option');
                            option.value = wf.id;
                            option.textContent = wf.id + ' - ' + wf.name;
                            select.appendChild(option);
                        });
                        select.disabled = false;
                        document.getElementById('btnStart').disabled = false;
                    } else {
                        select.innerHTML = '<option value="">No workflows found</option>';
                    }

                    // Subscribe to the session topic for chat responses
                    sessionSubscription = stompClient.subscribe('/topic/chat/' + currentSessionId, function(msg) {
                        handleResponse(JSON.parse(msg.body));
                    });
                    addMessage('system', 'Subscribed to /topic/chat/' + currentSessionId);
                });

            }, function (error) {
                setConnected(false);
                addMessage('error', 'Connection failed: ' + error);
            });
        }

        function disconnect() {
            if (sessionSubscription) {
                sessionSubscription.unsubscribe();
                sessionSubscription = null;
            }
            if (stompClient !== null) {
                stompClient.disconnect();
                stompClient = null;
            }
            setConnected(false);
            currentSessionId = null;
            document.getElementById('sessionInfo').textContent = '';
            document.getElementById('workflowSelect').innerHTML = '<option value="">-- Connect first --</option>';
            document.getElementById('workflowSelect').disabled = true;
            document.getElementById('btnStart').disabled = true;
            document.getElementById('userMessage').disabled = true;
            document.getElementById('btnSend').disabled = true;
            addMessage('system', 'Disconnected');
        }

        function startWorkflow() {
            var workflowId = document.getElementById('workflowSelect').value;
            if (!workflowId || !currentSessionId) {
                addMessage('error', 'Select a workflow first');
                return;
            }

            addMessage('system', 'Starting workflow ' + workflowId + '...');
            stompClient.send('/app/chat.start', {}, JSON.stringify({
                sessionId: currentSessionId,
                workflowId: parseInt(workflowId)
            }));

            document.getElementById('userMessage').disabled = false;
            document.getElementById('btnSend').disabled = false;
        }

        function handleResponse(data) {
            if (data.error) {
                addMessage('error', data.error);
                return;
            }

            var meta = '';
            if (data.node) {
                meta = 'Node ID: ' + data.node.id + ' | Type: ' + data.node.type;
                if (data.node.config && data.node.config.nodeType) {
                    meta += ' | NodeType: ' + data.node.config.nodeType;
                }
            }
            if (data.completed) {
                meta += ' | ✅ COMPLETED';
            }

            addMessage('bot', data.response, meta);

            if (data.completed) {
                document.getElementById('userMessage').disabled = true;
                document.getElementById('btnSend').disabled = true;
                addMessage('system', 'Workflow completed!');
            }
        }

        function sendMessage() {
            var input = document.getElementById('userMessage');
            var message = input.value.trim();
            if (!message || !currentSessionId) return;

            addMessage('user', message);
            stompClient.send('/app/chat.message', {}, JSON.stringify({
                sessionId: currentSessionId,
                message: message
            }));
            input.value = '';
        }
    </script>
</body>
</html>
